<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, ghost, solid, status, disabled" viewport="700x180" -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-panel); display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-tc);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 10px 20px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 200ms cubic-bezier(0.16,1,0.3,1);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary { background: var(--accent); color: #021018; box-shadow: 0 0 24px -6px var(--accent-glow); }
  .btn-ghost { background: transparent; color: var(--accent); border-color: var(--line-active); }
  .btn-solid-dark { background: var(--bg-panel-2); color: var(--fg-1); border-color: var(--line-base); }
  .btn-warn { background: transparent; color: var(--warn); border-color: var(--warn); }
  .btn-alert { background: var(--alert); color: #220509; box-shadow: 0 0 24px -6px var(--alert-glow); }
  .btn-disabled { background: var(--bg-panel-2); color: var(--fg-4); border-color: var(--line-faint); cursor: not-allowed; }
  .btn::before { content: '›'; font-family: var(--font-mono); font-weight: 700; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.2em; text-transform: uppercase; width: 90px; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">PRIMARY</span>
    <button class="btn btn-primary">送出報價</button>
    <button class="btn btn-ghost">取消</button>
    <button class="btn btn-solid-dark">儲存草稿</button>
  </div>
  <div class="row">
    <span class="label">STATUS</span>
    <button class="btn btn-warn">待確認</button>
    <button class="btn btn-alert">刪除案件</button>
    <button class="btn btn-disabled">已鎖定</button>
  </div>
</body>
</html>
