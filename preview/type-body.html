<!DOCTYPE html>
<!-- @dsCard group="Type" name="Body Type" subtitle="Noto Sans TC body + mixed Inter" viewport="700x220" -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Type · Body</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-panel); }
  .row { display: grid; grid-template-columns: 1fr 140px; gap: 16px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line-faint); }
  .specs { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; text-align: right; }
</style>
</head>
<body>
  <div class="row">
    <div style="font-family:var(--font-tc);font-size:16px;color:var(--fg-1);font-weight:500">大明水電工程行 · 台北市信義區</div>
    <div class="specs">TC · 500 · 16</div>
  </div>
  <div class="row">
    <div style="font-family:var(--font-tc);font-size:14px;color:var(--fg-2);line-height:1.5">電路配線工程含配電箱一座，配線距離約 42 公尺，含線槽與接地測試。</div>
    <div class="specs">TC · 400 · 14</div>
  </div>
  <div class="row">
    <div style="font-family:var(--font-tc);font-size:13px;color:var(--fg-3)">更新時間：2026/04/18 14:32</div>
    <div class="specs">TC · 400 · 13</div>
  </div>
  <div class="row">
    <div style="font-family:var(--font-body);font-size:14px;color:var(--fg-2)">Inter + Noto Sans TC mixed: Case #2025-0418 / 配線</div>
    <div class="specs">INTER 400 + TC · 14</div>
  </div>
</body>
</html>
