<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="8-point grid tokens S-1 → S-10" viewport="700x220" -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Spacing Scale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-panel); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.1em; width: 70px; text-transform: uppercase; }
  .bar { background: var(--accent); height: 10px; box-shadow: 0 0 8px -2px var(--accent-glow); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row"><span class="name">S-1</span><span class="bar" style="width:4px"></span><span class="val">4 PX</span></div>
  <div class="row"><span class="name">S-2</span><span class="bar" style="width:8px"></span><span class="val">8 PX</span></div>
  <div class="row"><span class="name">S-3</span><span class="bar" style="width:12px"></span><span class="val">12 PX</span></div>
  <div class="row"><span class="name">S-4</span><span class="bar" style="width:16px"></span><span class="val">16 PX</span></div>
  <div class="row"><span class="name">S-5</span><span class="bar" style="width:24px"></span><span class="val">24 PX</span></div>
  <div class="row"><span class="name">S-6</span><span class="bar" style="width:32px"></span><span class="val">32 PX</span></div>
  <div class="row"><span class="name">S-8</span><span class="bar" style="width:48px"></span><span class="val">48 PX</span></div>
  <div class="row"><span class="name">S-10</span><span class="bar" style="width:64px"></span><span class="val">64 PX</span></div>
</body>
</html>
