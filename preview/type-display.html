<!DOCTYPE html>
<!-- @dsCard group="Type" name="Display Type" subtitle="Orbitron display + Noto Sans TC headings" viewport="700x220" -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Type · Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-panel); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--line-faint); padding-bottom: 10px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; }
  .specs { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row">
      <div style="font-family:'Orbitron';font-size:36px;font-weight:700;color:var(--fg-1);letter-spacing:0.06em;line-height:1.1">HUD SYSTEM</div>
      <div class="specs">ORBITRON · 700 · 36 / 40</div>
    </div>
    <div class="row">
      <div style="font-family:'Orbitron';font-size:28px;font-weight:600;color:var(--fg-1);letter-spacing:0.06em;line-height:1.1">QUOTATION</div>
      <div class="specs">ORBITRON · 600 · 28 / 32</div>
    </div>
    <div class="row">
      <div style="font-family:'Noto Sans TC';font-size:22px;font-weight:700;color:var(--fg-1);line-height:1.3">目前案件 · 工料估算</div>
      <div class="specs">NOTO SANS TC · 700 · 22 / 28</div>
    </div>
  </div>
</body>
</html>
