<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Voice & Copy" subtitle="Do / Don't copy examples" viewport="700x220" -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Voice / Copy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--bg-panel); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .hd { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; padding-bottom: 6px; border-bottom: 1px solid var(--line-faint); }
  .ok { color: var(--ok); }
  .no { color: var(--alert); }
  .ex { display: flex; align-items: flex-start; gap: 8px; font-family: var(--font-tc); font-size: 13px; color: var(--fg-1); line-height: 1.4; }
  .mark { font-family: var(--font-mono); font-size: 11px; flex-shrink: 0; width: 14px; }
  .strike { color: var(--fg-3); text-decoration: line-through; text-decoration-color: var(--alert); }
</style>
</head>
<body>
  <div class="col">
    <div class="hd ok">✓ DO</div>
    <div class="ex"><span class="mark ok">+</span>案件 #2025-0418 已鎖定</div>
    <div class="ex"><span class="mark ok">+</span>STATUS · ACTIVE · LOCKED 03:42</div>
    <div class="ex"><span class="mark ok">+</span>材料估算 // 配電盤 ×1</div>
    <div class="ex"><span class="mark ok">+</span>送出報價</div>
  </div>
  <div class="col">
    <div class="hd no">✕ DON'T</div>
    <div class="ex"><span class="mark no">−</span><span class="strike">您的案件已經被鎖定囉！</span></div>
    <div class="ex"><span class="mark no">−</span><span class="strike">狀態：使用中（已鎖定3分鐘哦～）</span></div>
    <div class="ex"><span class="mark no">−</span><span class="strike">估算的材料：配電盤一個 :)</span></div>
    <div class="ex"><span class="mark no">−</span><span class="strike">送出報價單囉～</span></div>
  </div>
</body>
</html>
